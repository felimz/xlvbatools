name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check src tests
      - run: >-
          mypy --follow-imports=skip
          src/xlvbatools/project.py
          src/xlvbatools/execution.py
          src/xlvbatools/results.py
          src/xlvbatools/outputs.py
          src/xlvbatools/workflow.py
          src/xlvbatools/core/workflow.py
          src/xlvbatools/workbook/dumper.py
          src/xlvbatools/workbook/modifier.py
          src/xlvbatools/snapshots.py
          src/xlvbatools/cli

  offline:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: >-
          python -m pytest -m "not com and not e2e"
          --cov=xlvbatools --cov-report=term-missing --cov-fail-under=60
