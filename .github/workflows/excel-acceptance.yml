name: Excel acceptance

on:
  workflow_dispatch:
    inputs:
      run_stress:
        description: Run the 50-operation and 25-workflow lifecycle stress tier
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  live-excel:
    runs-on: [self-hosted, Windows, Excel]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m venv .venv
      - run: .venv\Scripts\python.exe -m pip install -e ".[dev]"
      - run: .venv\Scripts\python.exe scripts/test.py excel
      - if: ${{ inputs.run_stress }}
        run: .venv\Scripts\python.exe scripts/test.py stress
